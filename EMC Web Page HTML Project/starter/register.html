<!DOCTYPE html>
<html>

<head>

    <title>EMC Registration</title>

    <link rel="icon" href="emc.png">

    <style>

        body {
            font-family: Arial, sans-serif;
        }

        #notification {

            display: none;
            background-color: #d4edda;
            color: green;
            padding: 12px;
            width: 350px;
            margin: 20px auto;
            border-radius: 5px;
            font-weight: bold;

        }


        table {

            margin: auto;
            font-size: 18px;

        }


        input, select {

            padding: 5px;
            font-size: 15px;

        }


        input[type="submit"],
        input[type="reset"] {

            padding: 8px 20px;
            cursor: pointer;

        }


        a {

            color: blue;

        }

    </style>

</head>


<body>


<center>


    <!-- Resume upload notification -->

    <div id="notification"></div>



    <h1>Learning Academy🚀</h1>


    <h4>
        Training | Tech News | Freshers Guide
    </h4>


    <p>
        Empowering young developers to level up their skills through training in software development technologies🧑‍💻
    </p>


    <hr>



    <h2>Registration Form</h2>



    <form id="registrationForm">


        <table>


            <tr>

                <td>Name:</td>

                <td>
                    <input type="text" id="name" required>
                </td>

            </tr>



            <tr>

                <td>Age:</td>

                <td>
                    <input type="number" id="age" required>
                </td>

            </tr>



            <tr>

                <td>Gender:</td>

                <td>

                    <input type="radio" name="gender" value="Male">
                    Male


                    <input type="radio" name="gender" value="Female">
                    Female

                </td>

            </tr>




            <tr>

                <td>Email:</td>

                <td>
                    <input type="email" id="email" required>
                </td>

            </tr>




            <tr>

                <td>Select a Course:</td>

                <td>

                    <select id="course">

                        <option>
                            Full stack development
                        </option>

                        <option>
                            Java
                        </option>

                        <option>
                            C++
                        </option>

                    </select>


                </td>

            </tr>





            <tr>

                <td>
                    Upload Your Resume:
                </td>


                <td>

                    <input type="file" id="resume">

                </td>


            </tr>





            <tr>


                <td>

                    <input type="reset" id="resetBtn" value="Reset">

                </td>



                <td>

                    <input type="submit" value="Submit">

                </td>


            </tr>



        </table>


    </form>



    <hr>




    <p>

        <a href="index.html">
            Home
        </a>

        |

        <a href="https://www.instagram.com/">
            Instagram
        </a>

        |

        <a href="https://www.youtube.com/">
            Youtube
        </a>


    </p>


    <hr>



</center>



<script src="script.js"></script>


</body>

</html>
